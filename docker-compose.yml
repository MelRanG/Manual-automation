services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: docops
      POSTGRES_USER: docops
      POSTGRES_PASSWORD: docops_dev
    ports:
      - "5600:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docops"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # docker-compose 내부에서는 db:5432 로 접근 (.env의 localhost:5600 덮어씀)
      DATABASE_URL: postgresql+asyncpg://docops:docops_dev@db:5432/docops
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      # docker-compose에서는 backend 서비스명으로 접근
      BACKEND_HOST: backend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
