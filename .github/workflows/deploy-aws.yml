name: Deploy AWS Codex Dev

on:
  push:
    branches:
      - main
      - master
      - aws
  workflow_dispatch:

permissions:
  contents: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_STATE_BUCKET: manual-auto-codex-dev-tfstate-136609826435
  TF_LOCK_TABLE: manual-auto-codex-dev-tflock
  TF_STATE_KEY: codex-dev/terraform.tfstate
  TF_DIR: infra/terraform
  TF_VAR_account_id: "136609826435"
  TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TF_VAR_image_tag: ${{ github.sha }}
  TF_VAR_llm_provider: ${{ secrets.LLM_PROVIDER || 'bedrock' }}
  TF_VAR_bedrock_model_id: ${{ secrets.BEDROCK_MODEL_ID || 'us.anthropic.claude-sonnet-4-6' }}
  TF_VAR_bedrock_gateway_url: ${{ secrets.BEDROCK_GATEWAY_URL || '' }}
  TF_VAR_bedrock_api_key: ${{ secrets.BEDROCK_API_KEY || '' }}
  ECR_REPOSITORY_NAME: manual-auto-codex-dev-app
  ECR_REPOSITORY_URL: 136609826435.dkr.ecr.${{ secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com/manual-auto-codex-dev-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check AWS identity
        shell: bash
        run: aws sts get-caller-identity

      - name: Check ECR permissions
        run: aws ecr describe-registry --region "$AWS_REGION"

      - name: Check EC2/VPC permissions
        run: aws ec2 describe-availability-zones --region "$AWS_REGION"

      - name: Check ECS permissions
        run: aws ecs list-clusters --region "$AWS_REGION"

      - name: Check RDS permissions
        run: aws rds describe-db-engine-versions --engine postgres --region "$AWS_REGION" --max-records 20

      - name: Check S3 permissions
        run: aws s3api list-buckets

      - name: Bootstrap Terraform remote state
        shell: bash
        run: |
          set -euo pipefail
          if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            aws s3api create-bucket --bucket "$TF_STATE_BUCKET" --region "$AWS_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block \
              --bucket "$TF_STATE_BUCKET" \
              --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            aws s3api put-bucket-encryption \
              --bucket "$TF_STATE_BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            aws dynamodb wait table-exists --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform format and validate
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform fmt -check
          terraform validate

      - name: Import ECR repository if it already exists
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          if aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            terraform state show aws_ecr_repository.app >/dev/null 2>&1 || terraform import aws_ecr_repository.app "$ECR_REPOSITORY_NAME"
          fi

      - name: Create ECR repository first
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -target=aws_ecr_repository.app

      - name: Verify ECR repository exists
        run: aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_NAME" --region "$AWS_REGION"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push application image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${ECR_REPOSITORY_URL}:${GITHUB_SHA}"
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Wait for ECS service stability
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          CLUSTER="$(terraform output -raw ecs_cluster_name)"
          SERVICE="$(terraform output -raw ecs_service_name)"
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region "$AWS_REGION"

      - name: Print deployment URL
        working-directory: ${{ env.TF_DIR }}
        run: terraform output public_app_url

      - name: Record deployment URL
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform output -raw public_app_url > last-deployment-url.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-deployment-url.txt
          git diff --cached --quiet || git commit -m "chore: record AWS deployment URL [skip ci]"
          git push
